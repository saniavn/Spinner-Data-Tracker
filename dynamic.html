<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Spinners</title>
    <!-- Load Tailwind CSS for easy layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Set a default font */
      body {
        font-family: "Inter", sans-serif;
      }

      /* Define the spinning animation */
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* This is the spinning part (the wheel) */
      .spinner-wheel {
        border-radius: 50%;
        animation-name: spin;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        width: 100%; /* Fill container */
        height: 100%; /* Fill container */
        position: relative;
      }

      /* This is the parent container for one spinner */
      .spinner-container {
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: -50px; /* Negative margin helps creating dense overlap feeling */
      }

      /* * NEW ARROW STYLE: Central "Clock Hand" 
       * This stays inside the circle so it doesn't get clipped or messy.
       */
      .spinner-arrow {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 40%; /* Length of the hand (radius approx) */
        background-color: #1f2937; /* Dark Gray (Tailwind gray-800) */
        transform-origin: bottom center; /* Pivot from the center of the wheel */
        transform: translate(
          -50%,
          -100%
        ); /* Position bottom at center, pointing up */
        z-index: 20; /* Sit on top of labels */
        border-radius: 2px 2px 0 0;
        pointer-events: none; /* Let clicks pass through */
      }

      /* The triangular tip of the arrow */
      .spinner-arrow::after {
        content: "";
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 8px solid transparent;
        border-right: 8px solid transparent;
        border-bottom: 12px solid #1f2937;
      }

      /* A small dot in the center to cover the pivot point */
      .spinner-center-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 16px;
        height: 16px;
        background-color: #1f2937;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        z-index: 25; /* On top of the arrow */
        pointer-events: none;
      }

      /* Style for the text labels on the slices */
      .spinner-label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: black;
        font-weight: bold;
        white-space: nowrap;
        z-index: 5;
        user-select: none;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white p-8 font-sans">
    <header class="text-center mb-10 relative z-10">
      <h1
        class="text-3xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500"
      >
        56 Generated Spinners
      </h1>
      <p class="text-gray-400 mt-2">
        Each spinner has a uniform size, slice count (2-5), labels, and a
        central arrow.
      </p>
    </header>

    <!-- This container will hold all the generated spinners -->
    <main
      id="spinner-container"
      class="relative w-full min-h-[800px] p-4 overflow-hidden"
    >
      <!-- Spinners will be dynamically injected here by JavaScript -->
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("spinner-container");

        // --- Configuration ---
        const SPINNER_COUNT = 56;
        const FIXED_SIZE_PX = 250;
        const MIN_SLICES = 2;
        const MAX_SLICES = 5;
        const MIN_SPEED_SEC = 2;
        const MAX_SPEED_SEC = 7;
        const WORDS = [
          "Apple",
          "Pear",
          "Banana",
          "Orange",
          "Grape",
          "Kiwi",
          "Mango",
          "Plum",
          "Cherry",
          "Lemon",
          "Peach",
          "Berry",
          "Fig",
          "Lime",
        ];

        function getRandomInt(min, max) {
          return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function getRandomColor() {
          const hue = Math.floor(Math.random() * 360);
          const saturation = getRandomInt(70, 100);
          const lightness = getRandomInt(50, 70);
          return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        // --- Main loop to create spinners ---
        for (let i = 0; i < SPINNER_COUNT; i++) {
          const spinnerContainer = document.createElement("div");
          spinnerContainer.className = "spinner-container";

          // Set fixed size
          const size = FIXED_SIZE_PX;
          spinnerContainer.style.width = `${size}px`;
          spinnerContainer.style.height = `${size}px`;

          // Random Positioning for overlap effect
          spinnerContainer.style.top = `${Math.random() * 80}%`;
          spinnerContainer.style.left = `${Math.random() * 90}%`;
          // Random Z-Index creates the "layering" effect
          spinnerContainer.style.zIndex = getRandomInt(1, SPINNER_COUNT);

          const wheel = document.createElement("div");
          wheel.className = "spinner-wheel";

          const numSlices = getRandomInt(MIN_SLICES, MAX_SLICES);
          const gradientParts = [];
          const sliceAngle = 100 / numSlices;

          for (let j = 0; j < numSlices; j++) {
            const color = getRandomColor();
            const startPercent = j * sliceAngle;
            const endPercent = (j + 1) * sliceAngle;

            gradientParts.push(
              `${color} ${startPercent}% ${endPercent + 0.1}%`
            );

            // Create Label
            const label = document.createElement("div");
            label.className = "spinner-label";
            label.textContent = WORDS[(i * numSlices + j) % WORDS.length];

            // Calculate position
            const midAngleDeg = ((startPercent + endPercent) / 2 / 100) * 360;
            const translateDist = size * 0.3;

            // Correct Trig for positioning (math angle vs css angle)
            const mathAngleRad = ((midAngleDeg - 90) * Math.PI) / 180;
            const xPos = Math.cos(mathAngleRad) * translateDist;
            const yPos = Math.sin(mathAngleRad) * translateDist;

            label.style.transform = `translate(calc(-50% + ${xPos}px), calc(-50% + ${yPos}px)) rotate(${midAngleDeg}deg)`;
            label.style.fontSize = `${Math.max(10, size / 15)}px`;

            wheel.appendChild(label);
          }

          const gradientString = `conic-gradient(${gradientParts.join(", ")})`;
          wheel.style.backgroundImage = gradientString;

          // Animation Speed
          const speed = (
            Math.random() * (MAX_SPEED_SEC - MIN_SPEED_SEC) +
            MIN_SPEED_SEC
          ).toFixed(2);
          wheel.style.animationDuration = `${speed}s`;

          if (Math.random() > 0.5) {
            wheel.style.animationDirection = "reverse";
          }

          // Add parts to container
          spinnerContainer.appendChild(wheel);

          // 1. Add the Arrow (Hand)
          const arrow = document.createElement("div");
          arrow.className = "spinner-arrow";
          spinnerContainer.appendChild(arrow);

          // 2. Add the Center Dot (Hub)
          const centerDot = document.createElement("div");
          centerDot.className = "spinner-center-dot";
          spinnerContainer.appendChild(centerDot);

          container.appendChild(spinnerContainer);
        }
      });
    </script>
  </body>
</html>
