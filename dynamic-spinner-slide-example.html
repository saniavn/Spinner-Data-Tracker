<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Spinners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      /* Define the spinning animation */
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .spinner-wheel {
        border-radius: 50%;
        animation-name: spin;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        width: 100%;
        height: 100%;
        position: relative;
      }

      .spinner-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 20px;
      }

      .spinner-arrow {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-bottom: 15px solid #f87171;
        z-index: 10;
      }

      .spinner-label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: black;
        font-weight: bold;
        /* text-shadow: 0 0 3px white, 0 0 3px white, 0 0 3px white; */
        white-space: nowrap;
        z-index: 5;
        user-select: none;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white p-8">
    <header class="text-center mb-10">
      <h1
        class="text-3xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500"
      >
        56 High-Contrast Spinners
      </h1>
      <p class="text-gray-400 mt-2">
        Colors are now mathematically spaced to ensure they are distinct.
      </p>
    </header>

    <main
      id="spinner-container"
      class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6 md:gap-8 justify-items-center p-4"
    ></main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("spinner-container");

        const SPINNER_COUNT = 56;
        const FIXED_SIZE_PX = 150;
        const MIN_SLICES = 2;
        const MAX_SLICES = 5;
        const MIN_SPEED_SEC = 2;
        const MAX_SPEED_SEC = 7;
        const WORDS = [
          "Apple",
          "Pear",
          "Banana",
          "Orange",
          "Grape",
          "Kiwi",
          "Mango",
          "Plum",
          "Cherry",
          "Lemon",
          "Peach",
          "Berry",
          "Fig",
          "Lime",
        ];

        function getRandomInt(min, max) {
          return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // Loop to create spinners
        for (let i = 0; i < SPINNER_COUNT; i++) {
          const spinnerContainer = document.createElement("div");
          spinnerContainer.className = "spinner-container";
          spinnerContainer.style.width = `${FIXED_SIZE_PX}px`;
          spinnerContainer.style.height = `${FIXED_SIZE_PX}px`;

          const wheel = document.createElement("div");
          wheel.className = "spinner-wheel";

          // Determine Slices
          const numSlices = getRandomInt(MIN_SLICES, MAX_SLICES);

          // Pick a random starting point on the color wheel (0-360)
          const baseHue = Math.floor(Math.random() * 360);
          // Calculate the distance between colors to ensure they are far apart
          const hueStep = Math.floor(360 / numSlices);

          const gradientParts = [];
          const sliceAngle = 100 / numSlices; // Percentage

          for (let j = 0; j < numSlices; j++) {
            // Instead of random, calculate the hue based on the step
            const hue = (baseHue + j * hueStep) % 360;
            const saturation = getRandomInt(70, 100); // Keep distinct vibration
            const lightness = getRandomInt(50, 65); // Keep distinct brightness
            const color = `hsl(${hue}, ${saturation}%, ${lightness}%)`;

            const startPercent = j * sliceAngle;
            const endPercent = (j + 1) * sliceAngle;

            // Added +0.1% overlap to prevent tiny gaps in rendering
            gradientParts.push(
              `${color} ${startPercent}% ${endPercent + 0.1}%`
            );

            // Create and position label
            const label = document.createElement("div");
            label.className = "spinner-label";
            label.textContent = WORDS[(i * numSlices + j) % WORDS.length];

            const midAngleDeg = ((startPercent + endPercent) / 2 / 100) * 360;
            const translateDist = FIXED_SIZE_PX * 0.3;
            const mathAngleRad = ((midAngleDeg - 90) * Math.PI) / 180;
            const xPos = Math.cos(mathAngleRad) * translateDist;
            const yPos = Math.sin(mathAngleRad) * translateDist;

            label.style.transform = `translate(calc(-50% + ${xPos}px), calc(-50% + ${yPos}px)) rotate(${midAngleDeg}deg)`;
            label.style.fontSize = `${Math.max(10, FIXED_SIZE_PX / 15)}px`;

            wheel.appendChild(label);
          }

          const gradientString = `conic-gradient(${gradientParts.join(", ")})`;
          wheel.style.backgroundImage = gradientString;

          // Random speed and direction
          const speed = (
            Math.random() * (MAX_SPEED_SEC - MIN_SPEED_SEC) +
            MIN_SPEED_SEC
          ).toFixed(2);
          wheel.style.animationDuration = `${speed}s`;

          if (Math.random() > 0.5) {
            wheel.style.animationDirection = "reverse";
          }

          // Arrow
          const arrow = document.createElement("div");
          arrow.className = "spinner-arrow";

          spinnerContainer.appendChild(arrow);
          spinnerContainer.appendChild(wheel);
          container.appendChild(spinnerContainer);
        }
      });
    </script>
  </body>
</html>
