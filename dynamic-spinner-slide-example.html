<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Spinners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      /* Define the spinning animation */
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .spinner-wheel {
        border-radius: 50%;
        animation-name: spin;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
        width: 100%; /* Fill container */
        height: 100%; /* Fill container */
        position: relative; /* Needed for labels to position correctly */
      }

      /* This is the parent container for one spinner, wheel, labels, and arrow */
      .spinner-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        /* width and height set by JS */
        margin-top: 20px; /* Add margin for the arrow */
      }

      /* The arrow that points down at the wheel */
      .spinner-arrow {
        position: absolute;
        top: -15px; /* 15px above the container */
        left: 50%;
        transform: translateX(-50%);
        width: 0;
        height: 0;
        border-left: 10px solid transparent;
        border-right: 10px solid transparent;
        border-bottom: 15px solid #f87171; /* Points down (Tailwind red-400) */
        z-index: 10;
      }

      /* Style for the text labels on the slices */
      .spinner-label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: black;
        font-weight: bold;
        text-shadow: 0 0 3px white, 0 0 3px white, 0 0 3px white;
        white-space: nowrap; /* Prevent word wrap */
        z-index: 5;
        user-select: none;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-white p-8">
    <header class="text-center mb-10">
      <h1
        class="text-3xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500"
      >
        <!-- 56 Generated Spinners -->
      </h1>
      <p class="text-gray-400 mt-2">
        <!-- Each spinner has a uniform size, slice count (2-5), labels, and an
        arrow. -->
      </p>
    </header>

    <main
      id="spinner-container"
      class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6 md:gap-8 justify-items-center p-4"
    ></main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("spinner-container");

        const SPINNER_COUNT = 56; // Changed from 50 to 56
        const FIXED_SIZE_PX = 150; // Back to fixed size
        const MIN_SLICES = 2;
        const MAX_SLICES = 5;
        const MIN_SPEED_SEC = 2;
        const MAX_SPEED_SEC = 7;
        const WORDS = [
          "Apple",
          "Pear",
          "Banana",
          "Orange",
          "Grape",
          "Kiwi",
          "Mango",
          "Plum",
          "Cherry",
          "Lemon",
          "Peach",
          "Berry",
          "Fig",
          "Lime",
        ];

        /**
         * Generates a random integer between min (inclusive) and max (inclusive).
         */
        function getRandomInt(min, max) {
          return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        /**
         * Generates a random, vibrant HSL color string
         */
        function getRandomColor() {
          const hue = Math.floor(Math.random() * 360); // 0-359
          const saturation = getRandomInt(70, 100); // 70%-100% (vibrant)
          const lightness = getRandomInt(50, 70); // 50%-70% (bright)
          return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        }

        //Loop to create spinners
        for (let i = 0; i < SPINNER_COUNT; i++) {
          //The main spinner container
          const spinnerContainer = document.createElement("div");
          spinnerContainer.className = "spinner-container";

          //Set fixed size
          const size = FIXED_SIZE_PX; // Back to fixed size
          spinnerContainer.style.width = `${size}px`;
          spinnerContainer.style.height = `${size}px`;

          const wheel = document.createElement("div");
          wheel.className = "spinner-wheel";

          //Set a random number of slices
          const numSlices = getRandomInt(MIN_SLICES, MAX_SLICES);

          // 5. Generate the conic gradient and labels for the slices
          const gradientParts = [];
          const sliceAngle = 100 / numSlices; // Percentage

          for (let j = 0; j < numSlices; j++) {
            const color = getRandomColor();
            const startPercent = j * sliceAngle;
            const endPercent = (j + 1) * sliceAngle;

            gradientParts.push(
              `${color} ${startPercent}% ${endPercent + 0.1}%`
            );

            //Create and position the label for this slice
            const label = document.createElement("div");
            label.className = "spinner-label";
            label.textContent = WORDS[(i * numSlices + j) % WORDS.length];

            // Calculate angle for the middle of the slice
            const midAngleDeg = ((startPercent + endPercent) / 2 / 100) * 360;
            // Position scales with the spinner's size
            const translateDist = size * 0.3; // 30% from center
            const mathAngleRad = ((midAngleDeg - 90) * Math.PI) / 180;
            const xPos = Math.cos(mathAngleRad) * translateDist;
            const yPos = Math.sin(mathAngleRad) * translateDist;
            label.style.transform = `translate(calc(-50% + ${xPos}px), calc(-50% + ${yPos}px)) rotate(${midAngleDeg}deg)`;

            // Font size scales with the spinner's size
            label.style.fontSize = `${Math.max(10, size / 15)}px`;

            // Add the label to the WHEEL, not the container
            wheel.appendChild(label);
          }

          const gradientString = `conic-gradient(${gradientParts.join(", ")})`;
          wheel.style.backgroundImage = gradientString;

          //Set random animation speed
          const speed = (
            Math.random() * (MAX_SPEED_SEC - MIN_SPEED_SEC) +
            MIN_SPEED_SEC
          ).toFixed(2);
          wheel.style.animationDuration = `${speed}s`;

          if (Math.random() > 0.5) {
            wheel.style.animationDirection = "reverse";
          }

          //Create the arrow
          const arrow = document.createElement("div");
          arrow.className = "spinner-arrow";
          spinnerContainer.appendChild(arrow); // Add arrow to container

          spinnerContainer.appendChild(wheel);

          container.appendChild(spinnerContainer);
        }
      });
    </script>
  </body>
</html>
